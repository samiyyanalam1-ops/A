<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUBI ZAMAN // Live Feed</title>
  <style>
    :root {
      --neon-green: #39ff9a;
      --deep-bg: #050810;
      --glass-bg: rgba(10, 15, 30, 0.95);
    }

    body {
      background: var(--deep-bg);
      color: var(--neon-green);
      font-family: 'Courier New', monospace;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* ── BACKGROUND ENHANCEMENTS ── */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(57, 255, 154, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 154, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -2;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0.3;
    }

    .noise-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://media.giphy.com/media/oEI9uWU0WMrifuToSi/giphy.gif');
      opacity: 0.03;
      z-index: -1;
      pointer-events: none;
    }

    /* ── MAIN CONTAINER (Increased Width) ── */
    .dashboard-frame {
      position: relative;
      width: 700px; /* Increased from 500px */
      padding: 2px; 
      background: linear-gradient(45deg, var(--neon-green), transparent, var(--neon-green));
      animation: border-glow 4s linear infinite;
    }

    @keyframes border-glow {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .inner-content {
      background: var(--glass-bg);
      padding: 40px; /* Increased padding */
      position: relative;
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      letter-spacing: 3px;
      margin-bottom: 25px;
      opacity: 0.8;
    }

    /* ── IFRAME CLIPPER (Adjusted for visibility) ── */
    .clipper {
      width: 100%;
      height: 250px; /* Increased from 180px */
      overflow: hidden;
      position: relative;
      background: white;
      border: 1px solid rgba(57, 255, 154, 0.2);
      border-radius: 4px;
    }

    iframe {
      position: absolute;
      top: -480px; /* Recalibrated vertical position */
      left: 0;
      width: 100%;
      height: 1000px; /* Larger height to prevent cut-off */
      border: none;
      transform: scale(1.4); /* Slightly reduced scale for better framing */
      transform-origin: top center;
      pointer-events: none;
    }

    .bottom-shield {
      position: absolute;
      bottom: 0; left: 0; width: 100%; height: 60px;
      background: white;
      z-index: 5;
    }

    .footer {
      margin-top: 25px;
      font-size: 10px;
      color: rgba(57, 255, 154, 0.4);
      display: flex;
      justify-content: space-between;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dot { 
      width: 6px; height: 6px; 
      background: var(--neon-green); 
      display: inline-block; 
      border-radius: 50%; 
      box-shadow: 0 0 8px var(--neon-green); 
      animation: blink 1s infinite; 
      margin-right: 8px;
    }
    
    @keyframes blink { 50% { opacity: 0.3; } }
  </style>
</head>
<body>

<div class="noise-layer"></div>

<div class="dashboard-frame">
  <div class="inner-content">
    <div class="header-info">
      <span><div class="dot"></div> SYSTEM_ACTIVE: LIVE_SUBSCRIBER_FEED</span>
      <span>V.2.0</span>
    </div>
        
    <div class="clipper">
      <iframe src="https://socialcounts.org/youtube-live-subscriber-count/UCfhc2JtLUh_BPJW0boWvYGA" scrolling="no"></iframe>
      <div class="bottom-shield"></div>
    </div>

    <div class="footer">
        <span>ESTABLISHING SECURE CONNECTION...</span>
        <span>© SAMIYYAN_DEV</span>
    </div>
  </div>
</div>

</body>
</html>
